<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroMart</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <h2>ElectroMart</h2>
    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">Deals</a>
        <a href="#">Contact</a>
    </div>
</nav>

<!-- HERO -->
<section class="hero">
    <h1>Latest Electronic Gadgets</h1>
    <p>Upgrade your tech with modern devices</p>
    <button class="hero-btn">Shop Now</button>
</section>

<!-- PRODUCTS -->
<section class="products">
    <h2 class="section-title">Featured Products</h2>

    <div class="product-grid">

        <div class="card">
            <img src="https://images.pexels.com/photos/18105/pexels-photo.jpg">
            <h3>Laptop</h3>
            <p class="price">$800</p>
            <button class="btn">Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://images.pexels.com/photos/607812/pexels-photo-607812.jpeg">
            <h3>Smartphone</h3>
            <p class="price">$500</p>
            <button class="btn">Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://images.pexels.com/photos/3394664/pexels-photo-3394664.jpeg">
            <h3>Headphones</h3>
            <p class="price">$120</p>
            <button class="btn">Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://images.pexels.com/photos/437037/pexels-photo-437037.jpeg">
            <h3>Smart Watch</h3>
            <p class="price">$150</p>
            <button class="btn">Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://images.pexels.com/photos/51383/photo-camera-subject-photographer-51383.jpeg">
            <h3>Camera</h3>
            <p class="price">$600</p>
            <button class="btn">Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://images.pexels.com/photos/1334597/pexels-photo-1334597.jpeg">
            <h3>Tablet</h3>
            <p class="price">$300</p>
            <button class="btn">Add to Cart</button>
        </div>

    </div>
</section>

<!-- FOOTER -->
<footer class="footer">
    <p>© 2026 ElectroMart | All Rights Reserved</p>
</footer>

</body>
</html>
