<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reusable UI Components</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- 🔥 HERO SECTION (TOP PART) -->
    <div class="hero">
        <h2>GlowBeauty Store</h2>
        <p>Discover the latest fashion frocks & dresses</p>
        <button class="hero-btn">Shop Now</button>
    </div>

    <h1 class="title">Reusable UI Components</h1>

    <!-- NAVBAR -->
    <h2 class="section-title">Navbar Component</h2>

    <div class="navbar-box">
        <h2>GlowBeauty</h2>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">Offers</a>
            <a href="#">Contact</a>
        </div>
    </div>

    <!-- BUTTONS -->
    <h2 class="section-title">Button Components</h2>

    <div class="button-box">
        <button class="btn primary">Buy Now</button>
        <button class="btn dark">Add to Cart</button>
        <button class="btn outline">View Details</button>
    </div>

    <!-- PRODUCTS -->
    <h2 class="section-title">Product Card Components</h2>

    <div class="product-container">

        <div class="card">
            <img src="https://images.pexels.com/photos/1488463/pexels-photo-1488463.jpeg?auto=compress&cs=tinysrgb&w=400">
            <h3>Elegant Dress</h3>
            <p class="price">$25</p>
        </div>

        <div class="card">
            <img src="https://images.pexels.com/photos/1755428/pexels-photo-1755428.jpeg?auto=compress&cs=tinysrgb&w=400">
            <h3>Party Wear Dress</h3>
            <p class="price">$30</p>
        </div>

        <div class="card">
            <img src="https://images.pexels.com/photos/994234/pexels-photo-994234.jpeg?auto=compress&cs=tinysrgb&w=400">
            <h3>Casual Summer Dress</h3>
            <p class="price">$22</p>
        </div>

        <div class="card">
            <img src="https://images.pexels.com/photos/1536619/pexels-photo-1536619.jpeg?auto=compress&cs=tinysrgb&w=400">
            <h3>Floral Summer Dress</h3>
            <p class="price">$28</p>
        </div>

    </div>

</div>

</body>
</html>
